<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboQuant + Transformers.js — Semantic Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1.25rem;
      padding: 0.6rem 0.75rem;
      background: #1a1d2e;
      border: 1px solid #2d3348;
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-green { background: #064e3b; color: #6ee7b7; }
    .badge-yellow { background: #713f12; color: #fde047; }
    .badge-red { background: #7f1d1d; color: #fca5a5; }
    .badge-blue { background: #1e3a5f; color: #93c5fd; }
    .badge-gray { background: #27303f; color: #94a3b8; }
    .status-text { color: #94a3b8; flex: 1; }
    .status-text.loading { color: #fbbf24; }

    /* Progress bar */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      margin-top: 0.4rem;
      overflow: hidden;
      display: none;
    }
    .progress-wrap.active { display: block; }
    .progress-bar {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.15s ease;
      width: 0%;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
    .stat {
      background: #1a1d2e;
      border: 1px solid #2d3348;
      padding: 0.6rem;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: #60a5fa; }
    .stat-label { font-size: 0.7rem; color: #64748b; margin-top: 0.1rem; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Corpus textarea */
    label {
      font-weight: 600;
      font-size: 0.85rem;
      display: block;
      margin-bottom: 0.3rem;
      color: #cbd5e1;
    }
    textarea {
      width: 100%;
      height: 300px;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.65rem;
      background: #1a1d2e;
      color: #e2e8f0;
      border: 1px solid #2d3348;
      border-radius: 8px;
      resize: vertical;
      line-height: 1.65;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }

    /* Buttons */
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.85rem 0;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.55rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #334155; color: #64748b; cursor: default; }
    button.secondary {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    button.secondary:hover { background: #273449; color: #cbd5e1; }
    button.secondary:disabled { background: #1e293b; color: #475569; border-color: #27303f; }

    /* Search row */
    .search-row {
      display: flex;
      gap: 0.5rem;
      margin: 0.85rem 0;
    }
    .search-row input {
      flex: 1;
      padding: 0.55rem 0.75rem;
      font-size: 0.9rem;
      background: #1a1d2e;
      color: #e2e8f0;
      border: 1px solid #2d3348;
      border-radius: 6px;
    }

    /* Results */
    #results { margin-top: 0.5rem; }
    .result-item {
      display: flex;
      align-items: baseline;
      padding: 0.55rem 0;
      border-bottom: 1px solid #1e293b;
    }
    .result-rank {
      color: #475569;
      font-size: 0.78rem;
      min-width: 1.8rem;
      font-weight: 600;
    }
    .result-text { flex: 1; margin-right: 0.75rem; font-size: 0.9rem; }
    .result-score {
      color: #60a5fa;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .latency {
      margin-top: 0.6rem;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 0.78rem;
      color: #64748b;
      padding: 0.45rem 0.65rem;
      background: #141620;
      border-radius: 6px;
      display: none;
    }
    .latency.visible { display: block; }

    /* Error box */
    .error-box {
      padding: 0.7rem 0.85rem;
      background: #3b1515;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #fca5a5;
      margin-bottom: 1rem;
      display: none;
    }
    .error-box.visible { display: block; }

    /* Separator */
    hr {
      border: none;
      border-top: 1px solid #1e293b;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TurboQuant + Transformers.js</h1>
    <p class="subtitle">Real semantic search in the browser &mdash; WebGPU embeddings + 4-bit vector compression</p>

    <!-- Status bar -->
    <div class="status-bar">
      <span class="badge badge-gray" id="badgeBackend">BACKEND: --</span>
      <span class="badge badge-gray" id="badgeModel">MODEL: not loaded</span>
      <span class="badge badge-gray" id="badgeIndex">INDEX: empty</span>
      <span class="status-text" id="statusText">Initializing...</span>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Error box -->
    <div class="error-box" id="errorBox"></div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-value" id="nVectors">--</div><div class="stat-label">Vectors</div></div>
      <div class="stat"><div class="stat-value" id="compression">--</div><div class="stat-label">Compression</div></div>
      <div class="stat"><div class="stat-value" id="memBytes">--</div><div class="stat-label">Index size</div></div>
      <div class="stat"><div class="stat-value" id="searchLatency">--</div><div class="stat-label">Last search</div></div>
    </div>

    <!-- Corpus -->
    <label for="corpus">Corpus (one sentence per line)</label>
    <textarea id="corpus">Machine learning algorithms learn patterns from large datasets
The recipe calls for fresh basil, garlic, and olive oil
Mars rovers have discovered evidence of ancient water flows
The Roman Empire fell in 476 AD after centuries of decline
Basketball requires agility, coordination, and teamwork
Jazz music originated in New Orleans in the early 20th century
Python is a popular programming language for data science
Photosynthesis converts sunlight into chemical energy in plants
Antibiotics are used to treat bacterial infections but not viruses
Inflation occurs when prices rise and purchasing power decreases
Deep neural networks can recognize objects in images with high accuracy
Sourdough bread needs a starter culture and long fermentation time
The James Webb Space Telescope observes infrared light from distant galaxies
The French Revolution of 1789 transformed European politics
Swimming is an excellent low-impact cardiovascular exercise
Beethoven composed his Ninth Symphony while almost completely deaf
Rust programming language guarantees memory safety without garbage collection
Coral reefs are among the most biodiverse ecosystems on Earth
Vaccines train the immune system to recognize specific pathogens
Supply and demand determine prices in a free market economy
Transformers use self-attention to model long-range text dependencies
Sushi originated in Japan as a method of preserving fish in rice
Black holes warp spacetime so strongly that light cannot escape
The printing press invented by Gutenberg revolutionized information spread
Soccer is the most popular sport worldwide with billions of fans
Miles Davis pioneered cool jazz and jazz fusion genres
Version control with Git tracks changes across collaborative codebases
Migration patterns of birds span thousands of kilometers each year
CRISPR gene editing allows precise modifications to DNA sequences
Cryptocurrency uses blockchain technology for decentralized transactions</textarea>

    <!-- Actions -->
    <div class="actions">
      <button id="btnBuild" disabled>Build Index</button>
      <button id="btnSave" class="secondary" disabled>Save Index</button>
      <button id="btnLoad" class="secondary" disabled>Load Index</button>
    </div>

    <!-- Search -->
    <div class="search-row">
      <input type="text" id="query" placeholder="Type a search query..." value="how do neural networks process images">
      <button id="btnSearch" disabled>Search</button>
    </div>

    <!-- Results -->
    <div id="results"></div>
    <div class="latency" id="latency"></div>
  </div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';
    import init, {
      TurboQuantizer,
      CompressedIndex,
      build_index
    } from '../../pkg/turboquant_wasm.js';

    // ---------------------------------------------------------------
    // State
    // ---------------------------------------------------------------
    const DIM = 384;
    const BITS = 4;
    const SEED = 42n;
    const TOP_K = 5;
    const DB_NAME = 'turboquant-demo';
    const DB_STORE = 'indices';

    let embedder = null;
    let quantizer = null;
    let index = null;
    let sentences = [];
    let backendUsed = 'none';

    // DOM refs
    const $status = document.getElementById('statusText');
    const $badgeBackend = document.getElementById('badgeBackend');
    const $badgeModel = document.getElementById('badgeModel');
    const $badgeIndex = document.getElementById('badgeIndex');
    const $progressWrap = document.getElementById('progressWrap');
    const $progressBar = document.getElementById('progressBar');
    const $errorBox = document.getElementById('errorBox');
    const $btnBuild = document.getElementById('btnBuild');
    const $btnSearch = document.getElementById('btnSearch');
    const $btnSave = document.getElementById('btnSave');
    const $btnLoad = document.getElementById('btnLoad');
    const $results = document.getElementById('results');
    const $latency = document.getElementById('latency');

    // ---------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------
    function setStatus(msg, loading = false) {
      $status.textContent = msg;
      $status.classList.toggle('loading', loading);
    }

    function showError(msg) {
      $errorBox.textContent = msg;
      $errorBox.classList.add('visible');
    }

    function clearError() {
      $errorBox.textContent = '';
      $errorBox.classList.remove('visible');
    }

    function showProgress(pct) {
      $progressWrap.classList.add('active');
      $progressBar.style.width = pct + '%';
    }

    function hideProgress() {
      $progressWrap.classList.remove('active');
      $progressBar.style.width = '0%';
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function updateIndexStats() {
      if (!index) {
        document.getElementById('nVectors').textContent = '--';
        document.getElementById('compression').textContent = '--';
        document.getElementById('memBytes').textContent = '--';
        $badgeIndex.textContent = 'INDEX: empty';
        $badgeIndex.className = 'badge badge-gray';
        return;
      }
      document.getElementById('nVectors').textContent = index.n_vectors;
      document.getElementById('compression').textContent = quantizer.compression_ratio.toFixed(1) + 'x';
      document.getElementById('memBytes').textContent = formatBytes(index.memory_bytes);
      $badgeIndex.textContent = `INDEX: ${index.n_vectors} vectors`;
      $badgeIndex.className = 'badge badge-blue';
    }

    // ---------------------------------------------------------------
    // Embed a single text (returns Float32Array of length DIM)
    // ---------------------------------------------------------------
    async function embed(text) {
      const output = await embedder(text, { pooling: 'mean', normalize: true });
      return new Float32Array(output.tolist()[0]);
    }

    // ---------------------------------------------------------------
    // IndexedDB helpers
    // ---------------------------------------------------------------
    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          req.result.createObjectStore(DB_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function saveToIDB(blob, storedSentences) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(
          { index: blob, sentences: storedSentences },
          'data'
        );
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function loadFromIDB() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, 'readonly');
        const req = tx.objectStore(DB_STORE).get('data');
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }

    // ---------------------------------------------------------------
    // Initialization
    // ---------------------------------------------------------------
    async function initialize() {
      try {
        // 1. Init WASM
        setStatus('Loading TurboQuant WASM...', true);
        await init();
        quantizer = new TurboQuantizer(DIM, BITS, SEED);

        // 2. Detect WebGPU
        let device = 'wasm';
        const hasWebGPU = !!navigator.gpu;

        if (hasWebGPU) {
          try {
            const adapter = await navigator.gpu.requestAdapter();
            if (adapter) {
              device = 'webgpu';
            }
          } catch (_) {
            // WebGPU detection failed, stay with wasm
          }
        }

        if (device === 'webgpu') {
          $badgeBackend.textContent = 'WEBGPU';
          $badgeBackend.className = 'badge badge-green';
        } else {
          $badgeBackend.textContent = 'WASM (no WebGPU)';
          $badgeBackend.className = 'badge badge-yellow';
        }
        backendUsed = device;

        // 3. Load embedding model
        setStatus(`Loading all-MiniLM-L6-v2 on ${device}...`, true);
        showProgress(10);
        $badgeModel.textContent = 'MODEL: loading...';
        $badgeModel.className = 'badge badge-yellow';

        let progressStep = 10;
        embedder = await pipeline(
          'feature-extraction',
          'Xenova/all-MiniLM-L6-v2',
          {
            device: device,
            dtype: 'fp32',
            progress_callback: (report) => {
              if (report.status === 'progress' && report.progress != null) {
                const pct = Math.min(95, 10 + report.progress * 0.85);
                showProgress(pct);
                progressStep = pct;
              }
              if (report.status === 'done') {
                showProgress(progressStep + 1);
              }
            }
          }
        );

        showProgress(100);
        setTimeout(hideProgress, 400);

        $badgeModel.textContent = 'MODEL: ready';
        $badgeModel.className = 'badge badge-green';
        setStatus('Model loaded. Build an index or load a saved one.');

        $btnBuild.disabled = false;
        $btnLoad.disabled = false;
        updateIndexStats();

      } catch (err) {
        hideProgress();
        setStatus('Failed to initialize.', false);

        if (backendUsed === 'webgpu' && err.message && err.message.includes('webgpu')) {
          showError(
            'WebGPU pipeline failed. This browser may not fully support WebGPU for ML inference. ' +
            'Try Chrome 121+ or Edge 121+. Error: ' + err.message
          );
          // Retry with wasm backend
          setStatus('Retrying with WASM backend...', true);
          $badgeBackend.textContent = 'WASM (fallback)';
          $badgeBackend.className = 'badge badge-yellow';
          backendUsed = 'wasm';
          try {
            embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', {
              device: 'wasm',
              dtype: 'fp32',
            });
            clearError();
            $badgeModel.textContent = 'MODEL: ready';
            $badgeModel.className = 'badge badge-green';
            setStatus('Model loaded (WASM fallback). Build an index or load a saved one.');
            $btnBuild.disabled = false;
            $btnLoad.disabled = false;
          } catch (err2) {
            showError('Failed to load model with both WebGPU and WASM backends: ' + err2.message);
            $badgeModel.textContent = 'MODEL: failed';
            $badgeModel.className = 'badge badge-red';
          }
        } else {
          showError('Initialization error: ' + err.message);
          $badgeModel.textContent = 'MODEL: failed';
          $badgeModel.className = 'badge badge-red';
        }
      }
    }

    // ---------------------------------------------------------------
    // Build Index
    // ---------------------------------------------------------------
    async function buildIndex() {
      clearError();
      $btnBuild.disabled = true;
      $btnSearch.disabled = true;
      $btnSave.disabled = true;
      $btnBuild.textContent = 'Embedding...';

      try {
        const corpusText = document.getElementById('corpus').value;
        sentences = corpusText.split('\n').map(s => s.trim()).filter(s => s.length > 0);

        if (sentences.length < 2) {
          showError('Need at least 2 sentences in the corpus.');
          $btnBuild.textContent = 'Build Index';
          $btnBuild.disabled = false;
          return;
        }

        setStatus(`Embedding ${sentences.length} sentences...`, true);
        showProgress(0);

        // Embed all sentences, collecting into a flat Float32Array
        const allEmbeddings = new Float32Array(sentences.length * DIM);
        for (let i = 0; i < sentences.length; i++) {
          const vec = await embed(sentences[i]);
          allEmbeddings.set(vec, i * DIM);
          const pct = ((i + 1) / sentences.length) * 80;
          showProgress(pct);
          setStatus(`Embedding ${i + 1}/${sentences.length}...`, true);
        }

        // Build compressed index in one shot
        setStatus('Compressing with TurboQuant (4-bit)...', true);
        showProgress(85);
        const t0 = performance.now();
        index = build_index(quantizer, allEmbeddings, sentences.length);
        const buildMs = performance.now() - t0;

        showProgress(100);
        setTimeout(hideProgress, 400);

        setStatus(`Index built in ${buildMs.toFixed(0)}ms. Ready to search.`);
        $btnBuild.textContent = 'Rebuild Index';
        $btnBuild.disabled = false;
        $btnSearch.disabled = false;
        $btnSave.disabled = false;
        updateIndexStats();

      } catch (err) {
        hideProgress();
        showError('Build failed: ' + err.message);
        setStatus('Build failed.');
        $btnBuild.textContent = 'Build Index';
        $btnBuild.disabled = false;
        console.error(err);
      }
    }

    // ---------------------------------------------------------------
    // Search
    // ---------------------------------------------------------------
    async function runSearch() {
      if (!index || !embedder || !quantizer) return;
      clearError();

      const queryText = document.getElementById('query').value.trim();
      if (!queryText) return;

      $btnSearch.disabled = true;
      $btnSearch.textContent = 'Searching...';

      try {
        // Embed query
        const t0 = performance.now();
        const queryVec = await embed(queryText);
        const embedMs = performance.now() - t0;

        // Search compressed index
        const k = Math.min(TOP_K, index.n_vectors);
        const t1 = performance.now();
        const topKIndices = index.search(quantizer, queryVec, k);
        const searchMs = performance.now() - t1;

        const totalMs = embedMs + searchMs;

        // Compute approximate similarity scores for display
        // We re-embed the result sentences to get exact cosine similarity
        $results.innerHTML = '';
        for (let rank = 0; rank < topKIndices.length; rank++) {
          const idx = topKIndices[rank];
          const resultVec = await embed(sentences[idx]);

          // Cosine similarity (both vectors are already normalized)
          let score = 0;
          for (let j = 0; j < DIM; j++) score += queryVec[j] * resultVec[j];

          const item = document.createElement('div');
          item.className = 'result-item';
          item.innerHTML = `
            <span class="result-rank">${rank + 1}.</span>
            <span class="result-text">${escapeHtml(sentences[idx])}</span>
            <span class="result-score">${score.toFixed(4)}</span>
          `;
          $results.appendChild(item);
        }

        // Latency breakdown
        $latency.textContent = `Embed: ${embedMs.toFixed(1)}ms | Search: ${searchMs.toFixed(2)}ms | Total: ${totalMs.toFixed(1)}ms`;
        $latency.classList.add('visible');
        document.getElementById('searchLatency').textContent = totalMs.toFixed(1) + 'ms';

        setStatus(`Search complete (${totalMs.toFixed(1)}ms).`);

      } catch (err) {
        showError('Search failed: ' + err.message);
        console.error(err);
      } finally {
        $btnSearch.disabled = false;
        $btnSearch.textContent = 'Search';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---------------------------------------------------------------
    // Save / Load (IndexedDB)
    // ---------------------------------------------------------------
    async function saveIndex() {
      if (!index) return;
      clearError();
      $btnSave.disabled = true;
      $btnSave.textContent = 'Saving...';

      try {
        const blob = index.save();
        await saveToIDB(blob, sentences);
        setStatus(`Index saved to IndexedDB (${formatBytes(blob.byteLength)}).`);
      } catch (err) {
        showError('Save failed: ' + err.message);
        console.error(err);
      } finally {
        $btnSave.disabled = false;
        $btnSave.textContent = 'Save Index';
      }
    }

    async function loadIndex() {
      clearError();
      $btnLoad.disabled = true;
      $btnLoad.textContent = 'Loading...';

      try {
        const data = await loadFromIDB();
        if (!data) {
          showError('No saved index found in IndexedDB. Build one first.');
          $btnLoad.disabled = false;
          $btnLoad.textContent = 'Load Index';
          return;
        }

        index = CompressedIndex.load(data.index);
        sentences = data.sentences;

        // Populate textarea with loaded sentences
        document.getElementById('corpus').value = sentences.join('\n');

        setStatus(`Index loaded from IndexedDB: ${index.n_vectors} vectors.`);
        $btnSearch.disabled = false;
        $btnSave.disabled = false;
        $btnBuild.disabled = false;
        updateIndexStats();

      } catch (err) {
        showError('Load failed: ' + err.message);
        console.error(err);
      } finally {
        $btnLoad.disabled = false;
        $btnLoad.textContent = 'Load Index';
      }
    }

    // ---------------------------------------------------------------
    // Event listeners
    // ---------------------------------------------------------------
    $btnBuild.addEventListener('click', buildIndex);
    $btnSearch.addEventListener('click', runSearch);
    $btnSave.addEventListener('click', saveIndex);
    $btnLoad.addEventListener('click', loadIndex);

    document.getElementById('query').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !$btnSearch.disabled) {
        runSearch();
      }
    });

    // Boot
    initialize();
  </script>
</body>
</html>
