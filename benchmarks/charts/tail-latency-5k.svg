<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-label="Tail latency under sustained load">
  <style>
    .title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .subtitle { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .label { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .secondary { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .tick { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
    .value { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .axis { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text x="70" y="28" class="title">Tail latency under sustained load</text>
  <text x="70" y="46" class="subtitle">200 queries, d=384, 4-bit, N=5000</text>
  <text x="18" y="168" transform="rotate(-90, 18, 168)" class="axis">Latency (ms)</text>
  
      <line x1="70" y1="278" x2="836" y2="278" stroke="#e5e7eb" stroke-width="1" />
      <text x="60" y="282" text-anchor="end" class="tick">0</text>
    

      <line x1="70" y1="234" x2="836" y2="234" stroke="#e5e7eb" stroke-width="1" />
      <text x="60" y="238" text-anchor="end" class="tick">10</text>
    

      <line x1="70" y1="190" x2="836" y2="190" stroke="#e5e7eb" stroke-width="1" />
      <text x="60" y="194" text-anchor="end" class="tick">20</text>
    

      <line x1="70" y1="146" x2="836" y2="146" stroke="#e5e7eb" stroke-width="1" />
      <text x="60" y="150" text-anchor="end" class="tick">30</text>
    

      <line x1="70" y1="102" x2="836" y2="102" stroke="#e5e7eb" stroke-width="1" />
      <text x="60" y="106" text-anchor="end" class="tick">40</text>
    

      <line x1="70" y1="58" x2="836" y2="58" stroke="#e5e7eb" stroke-width="1" />
      <text x="60" y="62" text-anchor="end" class="tick">50</text>
    
  <line x1="70" y1="278" x2="836" y2="278" stroke="#94a3b8" stroke-width="1.5" />
  
      <rect x="169.66666666666669" y="243.372" width="56" height="34.628" rx="8" fill="#7c3aed" stroke="none" stroke-width="0" />
      <text x="197.66666666666669" y="235.372" text-anchor="middle" class="value" style="fill: #0f172a;">7.87 ms</text>
      <text x="197.66666666666669" y="300" text-anchor="middle" class="label" style="fill: #0f172a;">p50</text>
      
    

      <rect x="425.00000000000006" y="233.692" width="56" height="44.308" rx="8" fill="#7c3aed" stroke="none" stroke-width="0" />
      <text x="453.00000000000006" y="225.692" text-anchor="middle" class="value" style="fill: #0f172a;">10.07 ms</text>
      <text x="453.00000000000006" y="300" text-anchor="middle" class="label" style="fill: #0f172a;">p95</text>
      
    

      <rect x="680.3333333333334" y="176.228" width="56" height="101.77199999999999" rx="8" fill="#7c3aed" stroke="none" stroke-width="0" />
      <text x="708.3333333333334" y="168.228" text-anchor="middle" class="value" style="fill: #0f172a;">23.13 ms</text>
      <text x="708.3333333333334" y="300" text-anchor="middle" class="label" style="fill: #0f172a;">p99</text>
      
    
</svg>