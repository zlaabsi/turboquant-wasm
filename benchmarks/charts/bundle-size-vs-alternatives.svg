  <line x1="70" y1="278" x2="836" y2="278" stroke="#94a3b8" stroke-width="1.5" />
  
      <rect x="118.6" y="264.316" width="56" height="13.684000000000001" rx="8" fill="#635bff" stroke="#4338ca" stroke-width="1.5" />
      <text x="146.6" y="256.316" text-anchor="middle" class="value" style="fill: #4338ca;">31.1 KiB</text>
